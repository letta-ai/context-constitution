name: Notify rendered Constitution

on:
  push:
    branches: [main]
    paths:
      - "constitution/CONSTITUTION.md"
      - ".github/workflows/notify-site.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rendered Constitution refresh
        env:
          DISPATCH_TOKEN: ${{ secrets.HOMESITE_DISPATCH_TOKEN }}
          DISPATCH_URL: ${{ secrets.HOMESITE_DISPATCH_URL }}
        run: |
          if [ -z "${DISPATCH_TOKEN:-}" ] || [ -z "${DISPATCH_URL:-}" ]; then
            echo "Dispatch secrets not set; skipping (the scheduled sync will catch up)."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$DISPATCH_URL" \
            -d '{"event_type":"constitution-updated"}'
          echo "Dispatched constitution-updated."
